name: GTAFreeSTEM
options:
  bundleIdPrefix: com.rupayonhaldar
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: "6.0"
    MARKETING_VERSION: "0.1"
    CURRENT_PROJECT_VERSION: "1"
targets:
  GTAFreeSTEM:
    type: application
    platform: iOS
    sources:
      - GTAFreeSTEM
    resources:
      - GTAFreeSTEM/Assets.xcassets
      - GTAFreeSTEM/Resources
    info:
      path: GTAFreeSTEM/Info.plist
      properties:
        CFBundleDisplayName: GTA FREE STEM
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        ITSAppUsesNonExemptEncryption: false
        NSLocationWhenInUseUsageDescription: GTA FREE STEM can use your location only while browsing to find nearby free opportunities.
        UILaunchScreen:
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.rupayonhaldar.gtafreestem
        CODE_SIGN_STYLE: Automatic
        TARGETED_DEVICE_FAMILY: "1,2"
        SUPPORTS_MACCATALYST: false
  GTAFreeSTEMTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - GTAFreeSTEMTests
    info:
      path: GTAFreeSTEMTests/Info.plist
      properties:
        CFBundleDisplayName: GTA FREE STEM Tests
    dependencies:
      - target: GTAFreeSTEM
