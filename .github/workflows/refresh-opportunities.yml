name: Refresh public opportunities

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  refresh:
    name: Refresh source-backed static database
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Refresh library opportunities
        run: npm run generate:library

      - name: Run QA
        run: npm run qa

      - name: Build static export
        run: npm run build

      - name: Commit refreshed database
        run: |
          if git diff --quiet -- lib/generatedLibraryOpportunities.ts; then
            echo "No opportunity database changes found."
            exit 0
          fi
          git config user.name "gta-free-stem-bot"
          git config user.email "gta-free-stem-bot@users.noreply.github.com"
          git add lib/generatedLibraryOpportunities.ts
          git commit -m "Refresh generated public opportunities"
          git push
